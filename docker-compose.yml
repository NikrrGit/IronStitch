name: ironstitch

# Stage 1, step 2 of plan.md: Redpanda broker + Schema Registry + Console UI.
# Later steps will add: producer, spark, prometheus, grafana.

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: ironstitch-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=1G
      - --mode=dev-container
      - --default-log-level=info
    ports:
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # HTTP Proxy
      - "19092:19092"   # Kafka API (external)
      - "9644:9644"     # Admin API + Prometheus metrics
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    mem_limit: 1500m
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [ironstitch]

  console:
    image: redpandadata/console:v2.7.2
    container_name: ironstitch-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports:
      - "8080:8080"
    mem_limit: 256m
    networks: [ironstitch]

volumes:
  redpanda-data:

networks:
  ironstitch:
    name: ironstitch
